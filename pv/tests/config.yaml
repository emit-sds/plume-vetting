
#===============================================================================
# plume-vetting configuration and default parameters
#===============================================================================

#-------------------------------------------------------------------------------
# EMIT dataproducts and plume inventory:
#-------------------------------------------------------------------------------

# EMIT acquisition dataproducts root:
#emit_acquistion_dataproducts_root: '/store/emit/ops/data/acquisitions'
# local test subset:
emit_acquisition_dataproducts_root: './data/acquisitions'

# EMIT acquisition datatproduct types:
emit_l1b_radiance_type: 'rdn_b0106'
emit_l1b_glt_type: 'glt_b0106'
emit_l2a_mask_type: 'mask_b0106'

# methane, co2 matched filter dataproducts root:
# emit_matched_filter_dataproducts_root: '/store/brodrick/methane/methane_20230813'
# local test subset:
emit_matched_filter_dataproducts_root: './data/methane_20230813'

# methane plume data:
# emit_methane_plumes: '/store/brodrick/methane/ch4_plumedir/previous_manual_annotation_oneback.json'
# local copy:
emit_methane_plumes: './data/previous_manual_annotation_oneback.json'

#-------------------------------------------------------------------------------
# Parameters related to EMIT dataproducts and plume inventory:
#-------------------------------------------------------------------------------

# methane absorption ranges, nanometers, endpoints inclusive:
ch4_absorption_ranges:
    - [1640., 1690.]
    - [2100., 2440.]

NO_DATA_VALUE: -9999

#-------------------------------------------------------------------------------
# plume vetting controls:
#-------------------------------------------------------------------------------

# number of "shifted plume" variations:
NUM_PLUME_VARIATIONS: 10
#NUM_PLUME_VARIATIONS: 100

# exclude ch4 mf plume values greater than nth percentile (replaces original
# 'extreme_pts_flag', and adds a modifiable nth percentile value; note that a
# value of 100 implies no exclusion):
CH4_MF_EXCLUDE_PERCENTILE: 99

# number of target "seed pixels" for target/background radiance comparisons:
#NUM_SEED_PIXELS: 10
NUM_SEED_PIXELS: 40

# Gaussian filter (image convolution) for target pixel "dilation"
# (the following values produce a 3x3 mask about a pixel, and are equivalent to
# the original implementation's dilate_flag=1/square_size=3 dilate pixel
# settings):
GAUSSIAN_FILTER_SIGMA: 1
GAUSSIAN_FILTER_RESULTS_THRESHOLD: 0.05

# include only target pixels corresponding to positive ch4 matched filter
# values:
POSITIVE_TARGET_PIXELS_ONLY: False

# background spectra pairing
# (rectangular region from which background pixels will be selected (+- extents
# applied to min/max line/sample target pixel set):
#BACKGROUND_PAIRING_EXTENTS_IN_PIXELS: 20
BACKGROUND_PAIRING_EXTENTS_IN_PIXELS: 200

# matched filter threshold for background pixel consideration (pixels outside of
# +/- range to be excluded):
BACKGROUND_PAIRING_CH4_MF_THRESHOLD: 30

# spectral similarity wavelength inclusion logic (replaces 'full_flag',
# where 0 -> do not consider methane absorption bands,
# 1-> consider all bands):
SPECTRAL_SIMILARITY_USE_REDUCED_WAVELENGTHS: True

# impose "deterministic" random behaviour:
#RANDOM_SEED: 42 <- original, for some reason
RANDOM_SEED: 0

